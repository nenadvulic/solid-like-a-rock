name: CI

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (macOS)
    # SwiftSyntax builds an Apple toolchain target (arm64-apple-macos), so this
    # must run on a macOS runner, not ubuntu.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      # swift-syntax is slow to compile from source; cache the build dir.
      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Build
        run: swift build -v

      - name: Test
        run: swift test -v

      # Dogfood: the linter enforces its own architecture (.solid.yml).
      - name: Lint own architecture
        run: .build/debug/solid-like-a-rock lint --config .solid.yml Sources Plugins
