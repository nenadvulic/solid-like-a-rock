name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # needed to create the GitHub Release and upload assets

jobs:
  build-macos:
    name: Build macOS binaries
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build release (universal)
        run: |
          swift build -c release --arch arm64
          swift build -c release --arch x86_64
          lipo -create \
            .build/arm64-apple-macosx/release/solid-like-a-rock \
            .build/x86_64-apple-macosx/release/solid-like-a-rock \
            -output .build/release/solid-like-a-rock
          lipo -info .build/release/solid-like-a-rock

      - name: Package binary
        run: |
          BIN=.build/release/solid-like-a-rock
          test -x "$BIN" || { echo "binary not found at $BIN"; exit 1; }
          # Universal binary — works on both arm64 and x86_64 (Rosetta).
          TARBALL="solid-like-a-rock-macos-universal.tar.gz"
          tar -czf "$TARBALL" -C .build/release solid-like-a-rock
          shasum -a 256 "$TARBALL" > "$TARBALL.sha256"

      - name: Package artifactbundle (for the SwiftPM build-tool plugin)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          scripts/make-artifactbundle.sh "$VERSION" .
          BUNDLE_ZIP="solid-like-a-rock.artifactbundle.zip"
          ditto -c -k --keepParent solid-like-a-rock.artifactbundle "$BUNDLE_ZIP"
          # SwiftPM's own checksum, used by binaryTarget(url:checksum:).
          swift package compute-checksum "$BUNDLE_ZIP" > "$BUNDLE_ZIP.checksum"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-assets
          path: |
            solid-like-a-rock-macos-universal.tar.gz
            solid-like-a-rock-macos-universal.tar.gz.sha256
            solid-like-a-rock.artifactbundle.zip
            solid-like-a-rock.artifactbundle.zip.checksum
          if-no-files-found: error

  build-linux:
    name: Build Linux binary (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: x86_64,  runner: ubuntu-latest }
          - { arch: aarch64, runner: ubuntu-24.04-arm }
    container: swift:6.0-noble
    steps:
      - uses: actions/checkout@v4

      - name: Build release (static stdlib)
        run: swift build -c release --static-swift-stdlib --product solid-like-a-rock

      - name: Package binary
        run: |
          BIN=".build/${{ matrix.arch }}-unknown-linux-gnu/release/solid-like-a-rock"
          test -x "$BIN" || { echo "binary not found at $BIN"; exit 1; }
          # Strip debug info — local validation measured 119 MB unstripped.
          strip "$BIN"
          TARBALL="solid-like-a-rock-linux-${{ matrix.arch }}.tar.gz"
          tar -czf "$TARBALL" -C "$(dirname "$BIN")" solid-like-a-rock
          sha256sum "$TARBALL" > "$TARBALL.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}-assets
          path: |
            solid-like-a-rock-linux-${{ matrix.arch }}.tar.gz
            solid-like-a-rock-linux-${{ matrix.arch }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            solid-like-a-rock-macos-universal.tar.gz
            solid-like-a-rock-macos-universal.tar.gz.sha256
            solid-like-a-rock.artifactbundle.zip
            solid-like-a-rock.artifactbundle.zip.checksum
            solid-like-a-rock-linux-x86_64.tar.gz
            solid-like-a-rock-linux-x86_64.tar.gz.sha256
            solid-like-a-rock-linux-aarch64.tar.gz
            solid-like-a-rock-linux-aarch64.tar.gz.sha256
          generate_release_notes: true

  bump-homebrew:
    name: Bump Homebrew formula
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - name: Fetch the macOS universal checksum
        uses: actions/download-artifact@v4
        with:
          name: macos-assets

      - name: Check out the Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: nenadvulic/homebrew-solid-like-a-rock
          # GITHUB_TOKEN can't push to another repo — needs a PAT with
          # Contents:write on the tap, stored as the HOMEBREW_TAP_TOKEN secret.
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Bump version + sha256 in the formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA="$(cut -d ' ' -f1 solid-like-a-rock-macos-universal.tar.gz.sha256)"
          FORMULA="tap/Formula/solid-like-a-rock.rb"
          # The url is templated on v#{version}, so only these two lines change.
          sed -i -E "s/^  version \"[^\"]+\"/  version \"${VERSION}\"/" "$FORMULA"
          sed -i -E "s/^  sha256 \"[0-9a-f]+\"/  sha256 \"${SHA}\"/" "$FORMULA"
          echo "Bumped to ${VERSION} (sha256 ${SHA})"
          grep -E '^  (version|sha256) ' "$FORMULA"

      - name: Commit and push to the tap
        working-directory: tap
        run: |
          if git diff --quiet; then
            echo "Formula already up to date — nothing to push."
            exit 0
          fi
          git config user.name "Nenad VULIC"
          git config user.email "nenad@keeponapps.com"
          git commit -am "solid-like-a-rock ${GITHUB_REF_NAME#v}"
          git push
