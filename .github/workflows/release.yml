name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # needed to create the GitHub Release and upload assets

jobs:
  release:
    name: Build release binary & publish
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build release
        run: swift build -c release

      - name: Package binary
        run: |
          BIN=.build/release/solid-like-a-rock
          test -x "$BIN" || { echo "binary not found at $BIN"; exit 1; }
          ARCH=$(uname -m)
          # Stable asset name (no version), so `releases/latest/download/<name>`
          # works in CI; the release tag already carries the version.
          TARBALL="solid-like-a-rock-macos-${ARCH}.tar.gz"
          tar -czf "$TARBALL" -C .build/release solid-like-a-rock
          shasum -a 256 "$TARBALL" > "$TARBALL.sha256"
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.TARBALL }}
            ${{ env.TARBALL }}.sha256
          generate_release_notes: true
