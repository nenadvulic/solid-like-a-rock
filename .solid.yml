# SolidLikeARock — example configuration (v0.1.5 layered model)
#
# Architectural rule: dependencies point INWARD.
#
#   Domain  <-  Application  <-  Infrastructure  <-  Presentation
#
# Declare the layer order once and let the tool derive the "no outward
# dependency" rule; add allow/deny only for fine-grained exceptions.

# Path fragments to skip entirely (dependencies, build artefacts, …).
exclude:
  - /.build/
  - /Pods/
  - checkouts

# Modules every layer may always import (system frameworks, etc.).
alwaysAllow:
  - Foundation
  - Combine

# Innermost (index 0) to outermost. A layer may import its own and any
# more-inner layer; importing a more-outer one is a violation.
dependencyOrder: [Domain, Application, Infrastructure, Presentation]

layers:
  # A layer owns one or more modules (defaults to [name] when omitted) and is
  # matched to files by `paths` globs (* within a segment, ** across segments).
  - name: Domain
    modules: [DomainModels, DomainServices]
    paths:   [Sources/Domain/**, Sources/DomainServices/**]

  - name: Application
    modules: [Application]
    paths:   [Sources/Application/**]

  - name: Infrastructure
    modules: [Infrastructure]
    paths:   [Sources/Infrastructure/**]

  - name: Presentation
    modules: [Presentation]
    paths:   [Sources/Presentation/**]
    # Stricter-than-the-order exception: the UI must not reach Infrastructure
    # directly, even though that is technically an inward dependency.
    deny:    [Infrastructure]

# Legacy mode (no dependencyOrder) still works: give each layer an explicit
# `allow` (whitelist) or `deny` (blacklist) and rules apply per layer.
