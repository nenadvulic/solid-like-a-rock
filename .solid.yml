# .solid.yml — solid-like-a-rock linting itself (dogfood).
#
# This is the project's real, CI-enforced config — and doubles as the example
# referenced from the README. Architecture: SolidCore is the pure engine
# (SwiftSyntax parsing + Yams config, no CLI concerns); SolidCLI is the
# ArgumentParser shell around it; Plugins are SwiftPM plugin glue.
# Dependencies point inward:
#
#   SolidCLI ─▶ SolidCore        (the engine never knows about the CLI)
#   Plugins  ─▶ (PackagePlugin only)

# Path fragments to skip entirely (dependencies, build artefacts, and the
# test fixtures, which contain intentional violations).
exclude:
  - /.build/
  - /checkouts/
  - /Tests/

# Modules every layer may always import.
alwaysAllow:
  - Foundation

layers:
  # The engine: strict whitelist. Importing ArgumentParser (or anything
  # CLI-related) here is an architecture regression and fails the build.
  - name: Core
    paths: [Sources/SolidCore/**]
    allow:
      - SwiftSyntax
      - SwiftParser
      - Yams

  # The CLI shell: composition root — the engine plus argument parsing.
  - name: CLI
    paths: [Sources/SolidCLI/**]
    allow:
      - SolidCore
      - ArgumentParser

  # SwiftPM plugins: only the plugin API.
  - name: Plugins
    paths: [Plugins/**]
    allow:
      - PackagePlugin
